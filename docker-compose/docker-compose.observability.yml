version: "3.9"

networks:
  observability:
    driver: bridge

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel.yaml"]
    volumes:
      - ./observablity/otel-collector.yaml:/etc/otel.yaml
    ports:
      - "4317:4317"
    depends_on:
      - tempo
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observablity/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    networks:
      - observability

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./observablity/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./observablity/promtail.yaml:/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus
      - loki
    networks:
      - observability