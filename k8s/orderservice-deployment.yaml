apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: orderservice
  name: orderservice
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: orderservice
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: orderservice
    spec:
      containers:
        - env:
            - name: PORT
              value: "8003"
            - name: PRODUCT_SERVICE_URL
              value: http://productservice:8002
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          image: orderservice
          name: orderservice
          ports:
            - containerPort: 8003
              protocol: TCP
      restartPolicy: Always
