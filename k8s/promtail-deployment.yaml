apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ./docker-compose/docker-compose.yml -o ./k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: promtail
  name: promtail
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: promtail
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ./docker-compose/docker-compose.yml -o ./k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: promtail
    spec:
      containers:
        - image: grafana/promtail:2.9.0
          name: promtail
          volumeMounts:
            - mountPath: /etc/promtail/config.yml
              name: promtail-claim0
      restartPolicy: Always
      volumes:
        - name: promtail-claim0
          persistentVolumeClaim:
            claimName: promtail-claim0
