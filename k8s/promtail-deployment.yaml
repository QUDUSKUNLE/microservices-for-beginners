    spec:
      containers:
        - image: grafana/promtail:2.9.0
          name: promtail
          volumeMounts:
            - mountPath: /etc/promtail/config.yml
              name: promtail-claim0
      restartPolicy: Always
      volumes:
        - name: promtail-claim0
          persistentVolumeClaim:
            claimName: promtail-claim0
