apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: notificationservice
  name: notificationservice
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: notificationservice
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: notificationservice
    spec:
      containers:
        - env:
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          image: notificationservice
          name: notificationservice
      restartPolicy: Always
