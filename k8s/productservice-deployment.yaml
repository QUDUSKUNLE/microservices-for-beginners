apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: productservice
  name: productservice
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: productservice
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ./docker-compose/docker-compose.services.yml -o ./k8s/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: productservice
    spec:
      containers:
        - env:
            - name: PORT
              value: "8002"
          image: productservice
          name: productservice
          ports:
            - containerPort: 8002
              protocol: TCP
      restartPolicy: Always
