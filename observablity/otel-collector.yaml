receivers:
  otlp:
    protocols:
      grpc:

processors:
  batch:

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  
  prometheus:
    endpoint: "0.0.0.0:8889"
  
  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters:  [otlp/tempo]
    
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters:  [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters:  [logging]